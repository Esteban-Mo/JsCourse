<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Cours JavaScript complet et interactif — des bases à TypeScript avancé, avec quizz et progression XP.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<title>JS.cours — De Zéro à Maître</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">JS<span>.</span>cours</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 8 chapitres</div>
  </div>
  <nav class="nav-list" id="navList"></nav>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="top-bar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <span class="chapter-label" id="topLabel">Accueil</span>
    <div class="xp-badge">⚡ <span id="xpCount">0</span> XP</div>
  </div>

  <div class="content" id="content"></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
